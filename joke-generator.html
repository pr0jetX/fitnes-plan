<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Şaka Üreticisi</title>
    <style>
        body {
            font-family: Arial;
            background: #667eea;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            width: 400px;
        }
        h1 { color: #333; }
        .joke {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
            font-size: 18px;
            min-height: 60px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Şaka Üreticisi</h1>
        <div class="joke" id="joke">Şaka yükleniyorum...</div>
        <button onclick="getSaka()">Yeni Şaka Al 🎉</button>
    </div>

    <script>
        async function getSaka() {
            document.getElementById('joke').textContent = 'Yükleniyor...';
            try {
                const response = await fetch('https://official-joke-api.appspot.com/random_joke');
                const data = await response.json();
                document.getElementById('joke').textContent = data.setup + ' ' + data.punchline;
            } catch (error) {
                document.getElementById('joke').textContent = 'Şaka yüklenemedi!';
            }
        }
        getSaka();
    </script>
</body>
</html>
